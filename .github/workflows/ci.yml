name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,notebooks]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy

      - name: Validate dataset (schema + semantic rules)
        run: harmonia validate

      - name: Dataset is reproducible from the build tool
        run: |
          python dataset/tools/build_records.py
          python dataset/tools/build_cipa_reference.py
          git diff --exit-code dataset/records dataset/citations dataset/references \
            || (echo "::error::dataset/ is out of sync with its build tools — re-run them and commit" && exit 1)

      - name: Run tests
        run: pytest -q

      - name: Reference notebooks execute clean (nbmake)
        run: pytest --nbmake notebooks/ -q

      - name: Exports regenerate cleanly and match the committed sample set
        run: |
          harmonia export --all --output exports
          test -f exports/tables/cipa_inputs.csv
          test -f exports/omex/ord.omex
          # The committed exports/ are a deterministic projection of the dataset, so
          # they must be byte-identical to a fresh regeneration. We diff the TEXT
          # exports (provably cross-platform deterministic: pure string formatting);
          # the .omex zips are excluded because zlib's compressed bytes can differ
          # across platforms, but their text members are covered by the dirs below.
          git diff --exit-code exports/cellml exports/sbml exports/myokit exports/sedml exports/tables \
            || (echo "::error::exports/ is out of sync with the dataset — run 'harmonia export --all --output exports' and commit" && exit 1)

      - name: Info (smoke)
        run: harmonia info
